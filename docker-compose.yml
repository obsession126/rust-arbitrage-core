services:
  # 1. Rust Backend
  api:
    build: 
      context: ./backend/core
    container_name: refinery_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgres://user:admin@host.docker.internal:5433/refinery
      - REDIS_URL=redis://host.docker.internal:6379
      - JWT_SECRET=9908a4484ca6b67b28ab1bc503d15edc53c12c7c4697d92fbee48e74e674173e
      - LEMON_SQUEEZY_WEBHOOK_SECRET=super_secret_rust_2026
    ports:
      - "8080:8080"

  # 2. Next.js Frontend
  frontend:
    build:
      context: ./frontend/leadhunter-site
      dockerfile: Dockerfile
    container_name: refinery_frontend
    restart: always
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api

  # 3. Nginx (Gateway)
  gateway:
    image: nginx:alpine
    container_name: refinery_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
      - frontend

