services:
  # 1. База даних
  db:
    image: postgres:15-alpine
    container_name: leadhunter_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: leadhunter
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Порт 5432 не прокидаємо назовні (тільки для тунелю 127.0.0.1:5432:5432)

  # 2. Rust API (Core)
  api:
    build: 
      context: ./backend/core
    container_name: leadhunter_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/leadhunter
    ports:
      - "8080:8080"

  # 3. Rust Bot
  bot:
    build:
      context: ./backend/bot
    container_name: leadhunter_bot
    depends_on:
      - db
    environment:
      API_URL: ${API_URL}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/leadhunter
      TELOXIDE_TOKEN: ${BOT_TOKEN}

  # 4. Frontend (Next.js)
  frontend:
    build:
      context: ./frontend/leadhunter-site
    container_name: leadhunter_ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://your_server_ip:8080

volumes:
  pgdata: